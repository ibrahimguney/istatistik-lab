<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 9: Bayesçi Çıkarım Laboratuvarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <div class="w-full flex flex-col h-full bg-white border-r border-slate-200">
        <div class="bg-sky-800 text-white p-4 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold"><i class="fas fa-sync-alt mr-2"></i>Bölüm 9: Bayesçi İnanç Güncelleme</h1>
                <p class="text-sm text-sky-200">Önsel Bilgi (Prior) + Yeni Veri (Likelihood) = Sonsal (Posterior)</p>
            </div>
            <div class="text-xs bg-sky-900 px-3 py-1 rounded-full font-mono">Sayfa 107</div>
        </div>

        <div class="flex flex-1 p-6 gap-6 overflow-hidden">
            <div class="w-1/3 flex flex-col gap-6">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4 uppercase text-xs tracking-wider">1. Önsel Bilgi (Prior)</h2>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Başlangıç İnancı (Ortalama): <span id="priorVal">0.5</span></label>
                    <input type="range" id="prior" min="0" max="1" step="0.05" value="0.5" class="w-full h-2 bg-sky-200 rounded-lg appearance-none cursor-pointer" oninput="update()">
                    <label class="block text-sm font-medium text-slate-600 mt-4 mb-1">İnanç Gücü (Varyans): <span id="priorStrengthVal">5</span></label>
                    <input type="range" id="priorStrength" min="1" max="20" step="1" value="5" class="w-full h-2 bg-sky-200 rounded-lg appearance-none cursor-pointer" oninput="update()">
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4 uppercase text-xs tracking-wider">2. Yeni Gözlemler (Data)</h2>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Başarı Sayısı (x): <span id="dataXVal">5</span></label>
                    <input type="range" id="dataX" min="0" max="10" step="1" value="5" class="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer" oninput="update()">
                    <label class="block text-sm font-medium text-slate-600 mt-4 mb-1">Toplam Deneme (n): <span id="dataNVal">10</span></label>
                    <input type="range" id="dataN" min="1" max="10" step="1" value="10" class="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer" oninput="update()">
                </div>
            </div>

            <div class="flex-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-lg relative">
                <canvas id="bayesChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart;
        function update() {
            const p = parseFloat(document.getElementById('prior').value);
            const ps = parseFloat(document.getElementById('priorStrength').value);
            const x = parseFloat(document.getElementById('dataX').value);
            const n = parseFloat(document.getElementById('dataN').value);

            document.getElementById('priorVal').innerText = p;
            document.getElementById('priorStrengthVal').innerText = ps;
            document.getElementById('dataXVal').innerText = x;
            document.getElementById('dataNVal').innerText = n;

            // Basit Bayes güncelleme simülasyonu (Beta dağılımı mantığı)
            const priorA = p * ps;
            const priorB = (1 - p) * ps;
            const posteriorA = priorA + x;
            const posteriorB = priorB + (n - x);

            const labels = Array.from({length: 21}, (_, i) => (i/20).toFixed(2));
            const priorData = labels.map(v => Math.pow(v, priorA-1) * Math.pow(1-v, priorB-1));
            const postData = labels.map(v => Math.pow(v, posteriorA-1) * Math.pow(1-v, posteriorB-1));

            if(chart) chart.destroy();
            chart = new Chart(document.getElementById('bayesChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Önsel (Prior)', data: priorData, borderColor: '#0369a1', backgroundColor: 'rgba(3, 105, 161, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Sonsal (Posterior)', data: postData, borderColor: '#ea580c', backgroundColor: 'rgba(234, 88, 12, 0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        window.onload = update;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstatistik V2: Dijital Laboratuvarlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Navbar -->
    <nav class="bg-indigo-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">📊 İstatistik V2 Dijital</h1>
            <div class="space-x-4">
                <a href="#overview" class="hover:text-indigo-200">Özet</a>
                <a href="#modules" class="hover:text-indigo-200">Laboratuvarlar</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
        <section id="overview" class="mb-12">
            <h2 class="text-3xl font-bold mb-4">Hoş Geldiniz</h2>
            <p class="text-slate-600">İstatistik V2 kitabının tüm etkileşimli simülatörlerine buradan erişebilirsiniz. QR kodlar bu sayfadaki spesifik bölüm linklerine yönlendirecektir.</p>
        </section>

        <section id="modules">
            <h2 class="text-2xl font-bold mb-6">Bölüm Laboratuvarları</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="module-grid">
                <!-- Bölüm Kartları JS ile eklenecek -->
            </div>
        </section>
    </main>

    <script>
        const bölümler = [
            { id: 1, title: "Merkezi Limit Teoremi", link: "lab/bolum_1_laboratuvar.html" },
            { id: 2, title: "Sapma ve Varyans", link: "lab/bolum_2_laboratuvar.html" },
            { id: 3, title: "Güven Aralıkları", link: "lab/bolum_3_laboratuvar.html" },
            { id: 4, title: "Hipotez Testleri", link: "lab/bolum_4_laboratuvar.html" },
            { id: 5, title: "Regresyon Analizi", link: "lab/bolum_5_laboratuvar.html" },
            { id: 6, title: "ANOVA", link: "lab/bolum_6_laboratuvar.html" },
            { id: 7, title: "Ki-Kare Testleri", link: "lab/bolum_7_laboratuvar.html" },
            { id: 8, title: "Parametrik Olmayan Testler", link: "lab/bolum_8_laboratuvar.html" },
            { id: 9, title: "Bayesçi Çıkarım", link: "lab/bolum_9_laboratuvar.html" }
        ];

        const grid = document.getElementById('module-grid');
        bölümler.forEach(b => {
            grid.innerHTML += `
                <a href="${b.link}" class="bg-white p-6 rounded-xl shadow border border-slate-200 hover:border-indigo-500 transition-all hover:scale-105">
                    <h3 class="font-bold text-lg mb-2">Bölüm ${b.id}</h3>
                    <p class="text-slate-500">${b.title}</p>
                    <span class="text-indigo-600 font-semibold mt-4 block text-sm">Laboratuvarı Aç →</span>
                </a>
            `;
        });
    </script>
</body>
</html>
